<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pending Events</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/events.css" />
  </head>

  <body>
    <!-- ================= Sidebar ================= -->

    <div class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-ticket"></i>

        EventSphere
      </div>

      <ul>
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-chart-line"></i>

            Dashboard
          </a>
        </li>

        <li>
          <a href="users.html">
            <i class="fa-solid fa-users"></i>

            Users
          </a>
        </li>

        <li>
          <a href="events.html">
            <i class="fa-solid fa-calendar-days"></i>

            Events
          </a>
        </li>

        <li class="active">
          <a href="pending-events.html">
            <i class="fa-solid fa-hourglass-half"></i>

            Pending Events
          </a>
        </li>

        <li>
          <a href="orders.html">
            <i class="fa-solid fa-ticket"></i>

            Orders
          </a>
        </li>

        <li>
          <a href="paid-orders.html">
            <i class="fa-solid fa-sack-dollar"></i>

            Paid Customers
          </a>
        </li>

        <li>
          <a href="statistics.html">
            <i class="fa-solid fa-chart-column"></i>
            Statistics
          </a>
        </li>

        <li>
          <a href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>

            Logout
          </a>
        </li>
      </ul>
    </div>

    <!-- ================= Main ================= -->

    <div class="main">
      <div class="header">
        <div>
          <h2>Pending Events</h2>

          <p>Duyệt sự kiện do Ban tổ chức (BTC) gửi lên.</p>
        </div>

        <button class="btn btn-success" id="refreshBtn">Refresh</button>
      </div>

      <!-- Table -->

      <div class="table-box">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Organizer (BTC)</th>
              <th>Location</th>
              <th>Date</th>
              <th>Price</th>
              <th>Capacity</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="eventTable"></tbody>
        </table>

        <div id="emptyBox" class="text-center text-muted py-4" style="display: none">
          Không có sự kiện nào đang chờ duyệt.
        </div>
      </div>
    </div>

    <!-- ================= Reject Reason Modal ================= -->

    <div class="modal fade" id="rejectModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h4>Lý do từ chối</h4>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <form id="rejectForm">
              <input type="hidden" id="rejectEventId" />

              <div class="mb-3">
                <label class="form-label">Nhập lý do từ chối sự kiện này</label>
                <textarea id="rejectReason" class="form-control" rows="3" required></textarea>
              </div>

              <button class="btn btn-danger w-100" type="submit">
                Xác nhận từ chối
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/common.js"></script>

    <script src="js/pending-events.js"></script>
  </body>
</html>
