<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Events</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/events.css" />
  </head>

  <body>
    <!-- ================= Sidebar ================= -->

    <div class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-ticket"></i>

        EventSphere
      </div>

      <ul>
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-chart-line"></i>

            Dashboard
          </a>
        </li>

        <li>
          <a href="users.html">
            <i class="fa-solid fa-users"></i>

            Users
          </a>
        </li>

        <li class="active">
          <a href="events.html">
            <i class="fa-solid fa-calendar-days"></i>

            Events
          </a>
        </li>

        <li>
          <a href="pending-events.html">
            <i class="fa-solid fa-hourglass-half"></i>
            Pending Events
          </a>
        </li>

        <li>
          <a href="orders.html">
            <i class="fa-solid fa-ticket"></i>

            Orders
          </a>
        </li>

        <li>
          <a href="paid-orders.html">
            <i class="fa-solid fa-sack-dollar"></i>
            Paid Customers
          </a>
        </li>

        <li>
          <a href="statistics.html">
            <i class="fa-solid fa-chart-column"></i>
            Statistics
          </a>
        </li>

        <li>
          <a href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>

            Logout
          </a>
        </li>
      </ul>
    </div>

    <!-- ================= Main ================= -->

    <div class="main">
      <div class="header">
        <div>
          <h2>Events Management</h2>

          <p>Manage all events.</p>
        </div>

        <button class="btn btn-primary" id="addEventBtn">
          <i class="fa-solid fa-plus"></i>

          Add Event
        </button>
      </div>

      <!-- Toolbar -->

      <div class="toolbar">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search Event..."
        />

        <select id="statusFilter" class="form-select">
          <option value="">All Status</option>

          <option>Active</option>

          <option>Upcoming</option>

          <option>Closed</option>
        </select>

        <button class="btn btn-success" id="refreshBtn">Refresh</button>
      </div>

      <!-- Table -->

      <div class="table-box">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Location</th>
              <th>Date</th>
              <th>Price</th>
              <th>Capacity</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="eventTable"></tbody>
        </table>
      </div>

      <div class="pagination-box">
        <button class="btn btn-outline-primary" id="prevBtn">Previous</button>

        <span id="pageNumber"> Page 1 </span>

        <button class="btn btn-outline-primary" id="nextBtn">Next</button>
      </div>
    </div>

    <!-- ================= Add Event Modal ================= -->

    <div class="modal fade" id="eventModal" tabindex="-1">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h4>Event Information</h4>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <form id="eventForm">
              <input type="hidden" id="eventId" />

              <div class="mb-3">
                <label class="form-label">Title</label>
                <input id="title" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Location</label>
                <input id="location" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Event Date</label>
                <input
                  type="datetime-local"
                  id="date"
                  class="form-control"
                  required
                />
              </div>

              <div class="row">
                <div class="col-md-6">
                  <label class="form-label">Price</label>
                  <input
                    type="number"
                    id="price"
                    class="form-control"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Capacity</label>
                  <input
                    type="number"
                    id="seats"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <button class="btn btn-primary w-100 mt-4" type="submit">
                Save Event
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/common.js"></script>

    <script src="js/events.js"></script>
  </body>
</html>
