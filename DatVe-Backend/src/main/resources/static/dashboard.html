<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

  <body>
    <!-- ================= Sidebar ================= -->

    <div class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-ticket"></i>

        EventSphere
      </div>

      <ul>
        <li class="active">
          <a href="dashboard.html">
            <i class="fa-solid fa-chart-line"></i>

            Dashboard
          </a>
        </li>

        <li>
          <a href="users.html">
            <i class="fa-solid fa-users"></i>

            Users
          </a>
        </li>

        <li>
          <a href="events.html">
            <i class="fa-solid fa-calendar-days"></i>

            Events
          </a>
        </li>

        <li>
          <a href="pending-events.html">
            <i class="fa-solid fa-hourglass-half"></i>
            Pending Events
          </a>
        </li>

        <li>
          <a href="orders.html">
            <i class="fa-solid fa-ticket"></i>

            Orders
          </a>
        </li>

        <li>
          <a href="paid-orders.html">
            <i class="fa-solid fa-sack-dollar"></i>
            Paid Customers
          </a>
        </li>

        <li>
          <a href="statistics.html">
            <i class="fa-solid fa-chart-column"></i>
            Statistics
          </a>
        </li>

        <li>
          <a href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>

            Logout
          </a>
        </li>
      </ul>
    </div>

    <!-- ================= Main ================= -->

    <div class="main">
      <!-- Header -->

      <div class="header">
        <div>
          <h2>Dashboard</h2>

          <p>
            Welcome back,

            <span id="adminName"> Administrator </span>
          </p>
        </div>

        <div>
          <span id="today"></span>
        </div>
      </div>

      <!-- ================= Cards ================= -->

      <div class="cards">
        <div class="card-item">
          <div>
            <h3 id="userCount">0</h3>

            <p>Users</p>
          </div>

          <i class="fa-solid fa-users"></i>
        </div>

        <div class="card-item">
          <div>
            <h3 id="eventCount">0</h3>

            <p>Events</p>
          </div>

          <i class="fa-solid fa-calendar-days"></i>
        </div>

        <div class="card-item">
          <div>
            <h3 id="orderCount">0</h3>

            <p>Orders</p>
          </div>

          <i class="fa-solid fa-ticket"></i>
        </div>

        <div class="card-item">
          <div>
            <h3 id="revenue">0₫</h3>

            <p>Revenue</p>
          </div>

          <i class="fa-solid fa-dollar-sign"></i>
        </div>
      </div>

      <!-- ================= Chart ================= -->

      <div class="chart-box">
        <h4>Revenue</h4>

        <canvas id="revenueChart"></canvas>
      </div>

      <!-- ================= Bottom ================= -->

      <div class="bottom">
        <div class="recent">
          <h4>Recent Orders</h4>

          <table class="table">
            <thead>
              <tr>
                <th>ID</th>

                <th>Customer</th>

                <th>Event</th>

                <th>Status</th>
              </tr>
            </thead>

            <tbody id="recentOrders"></tbody>
          </table>
        </div>

        <div class="recent-user">
          <h4>Newest Users</h4>

          <ul id="recentUsers"></ul>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="js/api.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/common.js"></script>

    <script src="js/dashboard.js"></script>
  </body>
</html>
