<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>EventSphere - Đăng ký</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">
          <i class="fa-solid fa-ticket"></i>
        </div>

        <h2>EventSphere</h2>

        <p>Tạo tài khoản mới</p>

        <form id="registerForm">
          <div class="mb-3">
            <label>Họ và tên</label>
            <input
              id="fullName"
              type="text"
              class="form-control"
              placeholder="Nguyễn Văn A"
            />
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input
              id="email"
              type="email"
              class="form-control"
              placeholder="you@gmail.com"
            />
          </div>

          <div class="mb-3">
            <label>Mật khẩu</label>
            <div class="password-box">
              <input
                id="password"
                type="password"
                class="form-control"
                placeholder="********"
              />
              <button type="button" id="togglePassword">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label>Xác nhận mật khẩu</label>
            <input
              id="confirmPassword"
              type="password"
              class="form-control"
              placeholder="********"
            />
          </div>

          <div class="mb-3">
            <label class="d-block mb-2">Loại tài khoản</label>

            <div class="role-options d-flex gap-2">
              <label class="role-option flex-fill">
                <input type="radio" name="role" value="USER" checked />
                <span><i class="fa-solid fa-user"></i> User</span>
              </label>

              <label class="role-option flex-fill">
                <input type="radio" name="role" value="ADMIN" />
                <span><i class="fa-solid fa-user-shield"></i> Admin</span>
              </label>

              <label class="role-option flex-fill">
                <input type="radio" name="role" value="BTC" />
                <span><i class="fa-solid fa-people-group"></i> BTC</span>
              </label>
            </div>
          </div>

          <button class="btn btn-primary w-100 mt-3" type="submit">
            Đăng ký
          </button>

          <p class="text-center mt-3 mb-0">
            Đã có tài khoản?
            <a href="login.html" class="text-primary text-decoration-none">Đăng nhập</a>
          </p>
        </form>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/common.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
