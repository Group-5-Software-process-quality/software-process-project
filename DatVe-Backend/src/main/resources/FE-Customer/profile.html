<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ sơ cá nhân - EventSphere</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>

  <body>
    <!-- ================= Nav ================= -->

    <div class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-mark"><i class="fa-solid fa-ticket"></i></span>
          EventSphere
        </a>

        <div class="nav-links">
          <a href="index.html">Khám phá sự kiện</a>
        </div>

        <div class="nav-actions">
          <a href="cart.html" class="nav-icon-link" title="Giỏ hàng">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cartBadge">0</span>
          </a>

          <a href="my-tickets.html" class="nav-icon-link" title="Vé của tôi">
            <i class="fa-solid fa-ticket"></i>
          </a>

          <a href="profile.html" class="user-pill">
            <span class="avatar" id="userAvatar">P</span>
            <span id="userNameShort">Bạn</span>
          </a>
        </div>
      </div>
    </div>

    <div class="container page">
      <h1 class="section-title">Hồ sơ cá nhân</h1>

      <!-- ================= Tabs ================= -->

      <div class="tabs">
        <div class="tab active" id="tabInfoBtn">Thông tin</div>
        <div class="tab" id="tabPasswordBtn">Đổi mật khẩu</div>
      </div>

      <!-- ================= Tab: Thông tin ================= -->

      <div id="tabInfo">
        <div class="card card-pad">
          <form id="profileForm">
            <div class="field">
              <label>Họ và tên</label>
              <input class="input" id="fullName" required />
            </div>

            <div class="field">
              <label>Email</label>
              <input class="input" id="email" disabled />
            </div>

            <div class="field">
              <label>Số điện thoại</label>
              <input class="input" id="phone" />
            </div>

            <button class="btn btn-primary" type="submit">Lưu thay đổi</button>
          </form>
        </div>
      </div>

      <!-- ================= Tab: Đổi mật khẩu ================= -->

      <div id="tabPassword" style="display: none">
        <div class="card card-pad">
          <form id="passwordForm">
            <div class="field">
              <label>Mật khẩu hiện tại</label>
              <input class="input" type="password" id="currentPassword" required />
            </div>

            <div class="field">
              <label>Mật khẩu mới</label>
              <input class="input" type="password" id="newPassword" required minlength="6" />
            </div>

            <button class="btn btn-primary" type="submit">Đổi mật khẩu</button>
          </form>
        </div>
      </div>

      <button class="btn btn-danger logout-btn" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        Đăng xuất
      </button>
    </div>

    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
