<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết sự kiện - EventSphere</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/event-detail.css" />
  </head>

  <body>
    <!-- ================= Nav ================= -->

    <div class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-mark"><i class="fa-solid fa-ticket"></i></span>
          EventSphere
        </a>

        <div class="nav-links">
          <a href="index.html">Khám phá sự kiện</a>
        </div>

        <div class="nav-actions">
          <a href="cart.html" class="nav-icon-link" title="Giỏ hàng">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cartBadge">0</span>
          </a>

          <a href="my-tickets.html" class="nav-icon-link" title="Vé của tôi">
            <i class="fa-solid fa-ticket"></i>
          </a>

          <a href="profile.html" class="user-pill">
            <span class="avatar" id="userAvatar">P</span>
            <span id="userNameShort">Bạn</span>
          </a>
        </div>
      </div>
    </div>

    <div class="container page">
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Quay lại danh sách
      </a>

      <!-- ================= Event Info ================= -->

      <div class="card">
        <div class="event-hero-img" id="eventImage">
          <i class="fa-solid" id="eventIcon"></i>
        </div>

        <div class="card-pad">
          <span class="badge badge-primary" id="eventCategory">-</span>

          <h1 class="event-title" id="eventTitle">-</h1>

          <div class="event-meta-row">
            <span><i class="fa-regular fa-calendar"></i> <span id="eventDate">-</span></span>
            <span><i class="fa-solid fa-location-dot"></i> <span id="eventLocation">-</span></span>
            <span><i class="fa-solid fa-building"></i> Tổ chức bởi EventSphere Team</span>
            <span class="stars">
              <i class="fa-solid fa-star"></i>
              <span id="eventRating">-</span> (<span id="eventReviewCount">0</span> đánh giá)
            </span>
          </div>

          <p class="event-description" id="eventDescription">-</p>
        </div>
      </div>

      <!-- ================= Ticket Types ================= -->

      <div class="card card-pad section-box">
        <h2 class="section-title">Chọn loại vé</h2>

        <div id="ticketTypesBox"></div>
      </div>

      <!-- ================= Running Total ================= -->

      <div class="card card-pad section-box sticky-total">
        <div class="total-row">
          <div>
            <div class="total-label">Tạm tính</div>
            <div class="total-value" id="runningTotal">0 đ</div>
          </div>

          <button class="btn btn-primary" id="addCartBtn" disabled>
            <i class="fa-solid fa-cart-plus"></i>
            Thêm vào giỏ hàng
          </button>
        </div>
      </div>

      <!-- ================= Reviews ================= -->

      <div class="card card-pad section-box">
        <h2 class="section-title">Đánh giá từ khách tham dự</h2>

        <div class="field">
          <label>Đánh giá của bạn</label>
          <div class="rating-input" id="ratingInput">
            <button type="button" data-val="1"><i class="fa-solid fa-star"></i></button>
            <button type="button" data-val="2"><i class="fa-solid fa-star"></i></button>
            <button type="button" data-val="3"><i class="fa-solid fa-star"></i></button>
            <button type="button" data-val="4"><i class="fa-solid fa-star"></i></button>
            <button type="button" data-val="5"><i class="fa-solid fa-star"></i></button>
          </div>
        </div>

        <div class="field">
          <textarea class="input" id="reviewComment" placeholder="Chia sẻ cảm nhận của bạn về sự kiện..."></textarea>
        </div>

        <button class="btn btn-primary btn-sm" id="submitReviewBtn">Gửi đánh giá</button>

        <div id="reviewsList" class="reviews-list"></div>
      </div>
    </div>

    <div class="footer">
      <div class="container">
        EventSphere · Nền tảng quản lý sự kiện &amp; bán vé
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/event-detail.js"></script>
  </body>
</html>
