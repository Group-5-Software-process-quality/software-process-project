<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng - EventSphere</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>

  <body>
    <!-- ================= Nav ================= -->

    <div class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-mark"><i class="fa-solid fa-ticket"></i></span>
          EventSphere
        </a>

        <div class="nav-links">
          <a href="index.html">Khám phá sự kiện</a>
        </div>

        <div class="nav-actions">
          <a href="cart.html" class="nav-icon-link" title="Giỏ hàng">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cartBadge">0</span>
          </a>

          <a href="my-tickets.html" class="nav-icon-link" title="Vé của tôi">
            <i class="fa-solid fa-ticket"></i>
          </a>

          <a href="profile.html" class="user-pill">
            <span class="avatar" id="userAvatar">P</span>
            <span id="userNameShort">Bạn</span>
          </a>
        </div>
      </div>
    </div>

    <div class="container page">
      <h1 class="section-title">Giỏ hàng của bạn</h1>

      <!-- ================= Cart items (JS đổ dữ liệu vào) ================= -->

      <div id="emptyCartBox" class="empty-state" style="display: none">
        <div class="icon"><i class="fa-solid fa-cart-shopping"></i></div>
        Giỏ hàng của bạn đang trống.
        <br />
        <a href="index.html" class="btn btn-primary" style="margin-top: 16px">Khám phá sự kiện</a>
      </div>

      <div id="cartBox" style="display: none">
        <div class="card">
          <div id="cartItemsList"></div>
        </div>

        <!-- ================= Summary ================= -->

        <div class="card card-pad summary-box">
          <div class="field discount-field">
            <div style="flex: 1">
              <label>Mã giảm giá</label>
              <input class="input" id="discountCode" placeholder="Nhập mã giảm giá (nếu có), thử SUMMER10" />
            </div>
            <button class="btn btn-ghost" id="applyDiscountBtn">Áp dụng</button>
          </div>

          <div id="discountMsg"></div>

          <div class="ticket-divider" style="margin: 20px 0"></div>

          <div class="summary-row">
            <span>Tạm tính</span>
            <span id="subtotal">0 đ</span>
          </div>

          <div class="summary-row discount-row" id="discountRow" style="display: none">
            <span>Giảm giá</span>
            <span id="discountAmount"></span>
          </div>

          <div class="summary-row total-row">
            <span>Tổng cộng</span>
            <span id="total">0 đ</span>
          </div>

          <button class="btn btn-primary btn-block" id="checkoutBtn" style="margin-top: 14px">
            <i class="fa-solid fa-lock"></i>
            Thanh toán
          </button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="container">
        EventSphere · Nền tảng quản lý sự kiện &amp; bán vé
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
