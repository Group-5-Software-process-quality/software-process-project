<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventSphere - Khám phá sự kiện</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <!-- ================= Nav ================= -->

    <div class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-mark"><i class="fa-solid fa-ticket"></i></span>
          EventSphere
        </a>

        <div class="nav-links">
          <a href="index.html" class="active">Khám phá sự kiện</a>
        </div>

        <div class="nav-actions">
          <a href="cart.html" class="nav-icon-link" title="Giỏ hàng">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cartBadge">0</span>
          </a>

          <a href="my-tickets.html" class="nav-icon-link" title="Vé của tôi">
            <i class="fa-solid fa-ticket"></i>
          </a>

          <a href="profile.html" class="user-pill">
            <span class="avatar" id="userAvatar">P</span>
            <span id="userNameShort">Bạn</span>
          </a>
        </div>
      </div>
    </div>

    <!-- ================= Hero ================= -->

    <section class="hero">
      <div class="container">
        <h1>Tìm sự kiện đáng nhớ tiếp theo của bạn</h1>
        <p>
          Nhạc sống, hội thảo, thể thao và nhiều hơn nữa - đặt vé điện tử chỉ
          trong vài giây.
        </p>

        <form class="search-bar" id="searchForm">
          <input
            type="text"
            id="q"
            placeholder="Tìm theo tên sự kiện, địa điểm..."
          />
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-magnifying-glass"></i>
            Tìm kiếm
          </button>
        </form>
      </div>
    </section>

    <!-- ================= Filters ================= -->

    <div class="container">
      <div class="filters-row">
        <select id="filterCategory">
          <option value="">Tất cả danh mục</option>
        </select>

        <input type="text" id="filterLocation" placeholder="Địa điểm" />

        <input type="date" id="filterDateFrom" title="Từ ngày" />

        <button class="btn btn-ghost btn-sm" id="clearFiltersBtn">
          <i class="fa-solid fa-rotate-left"></i>
          Xóa lọc
        </button>
      </div>

      <!-- ================= Events Grid ================= -->

      <h2 class="section-title">Sự kiện sắp diễn ra</h2>

      <div id="eventsGrid" class="grid"></div>
    </div>

    <!-- ================= Footer ================= -->

    <div class="footer">
      <div class="container">
        EventSphere · Nền tảng quản lý sự kiện &amp; bán vé
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
