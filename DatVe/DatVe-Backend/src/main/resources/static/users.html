<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Users Management</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/users.css" />
  </head>

  <body>
    <!-- ================= Sidebar ================= -->

    <div class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-ticket"></i>

        EventSphere
      </div>

      <ul>
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-chart-line"></i>

            Dashboard
          </a>
        </li>

        <li class="active">
          <a href="users.html">
            <i class="fa-solid fa-users"></i>

            Users
          </a>
        </li>

        <li>
          <a href="events.html">
            <i class="fa-solid fa-calendar-days"></i>

            Events
          </a>
        </li>

        <li>
          <a href="orders.html">
            <i class="fa-solid fa-ticket"></i>

            Orders
          </a>
        </li>

        <li class="active">
          <a href="statistics.html">
            <i class="fa-solid fa-chart-column"></i>
            Statistics
          </a>
        </li>

        <li>
          <a href="#">
            <i class="fa-solid fa-chart-column"></i>

            Statistics
          </a>
        </li>

        <li>
          <a href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>

            Logout
          </a>
        </li>
      </ul>
    </div>

    <!-- ================= Main ================= -->

    <div class="main">
      <!-- Header -->

      <div class="header">
        <div>
          <h2>Users Management</h2>

          <p>Manage all application users.</p>
        </div>

        <div>
          <button class="btn btn-success" id="addUserBtn">
            <i class="fa-solid fa-plus"></i>

            Add User
          </button>
        </div>
      </div>

      <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5>User Information</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <input type="hidden" id="userId" />

              <div class="mb-3">
                <label>Full Name</label>
                <input id="fullName" class="form-control" />
              </div>

              <div class="mb-3">
                <label>Email</label>
                <input id="email" class="form-control" />
              </div>

              <div class="mb-3">
                <label>Password</label>
                <input id="password" type="password" class="form-control" />
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" data-bs-dismiss="modal">
                Cancel
              </button>

              <button class="btn btn-primary" id="saveUserBtn">Save</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Search -->

      <div class="toolbar">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search by name or email..."
        />

        <button class="btn btn-primary" id="refreshBtn">
          <i class="fa-solid fa-rotate"></i>

          Refresh
        </button>
      </div>

      <!-- Table -->

      <div class="table-box">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Full Name</th>
              <th>Email</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="userTable"></tbody>
        </table>
      </div>

      <!-- Pagination -->

      <div class="pagination-box">
        <button class="btn btn-outline-primary" id="prevBtn">Previous</button>

        <span id="pageNumber"> Page 1 </span>

        <button class="btn btn-outline-primary" id="nextBtn">Next</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/common.js"></script>

    <script src="js/users.js"></script>
  </body>
</html>
